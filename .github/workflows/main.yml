name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Java Kurulumu (JDK 21 - KSP Uyuşmazlık Çözümü)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Gradle Ayarlarını Otomatik Düzenle (Hataları ve İmzayı Engelle)
        run: |
          # 1. build.gradle.kts içine Lint engelleme kurallarını otomatik ekler
          sed -i '/android {/a \  lint {\n    checkReleaseBuilds = false\n    abortOnError = false\n  }' app/build.gradle.kts
          
          # 2. Release build tipindeki imza (release signingConfig) zorunluluğunu kaldırır, debug yapar
          sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debugConfig")/g' app/build.gradle.kts

      - name: Gradle Wrapper Oluştur ve APK Derle
        run: |
          gradle wrapper
          ./gradlew assembleRelease

      - name: APK Dosyasını Çıktı Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: screen-recorder-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
